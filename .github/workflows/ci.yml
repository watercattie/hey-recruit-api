name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, intl, pdo_sqlite
        coverage: none

    - name: Install dependencies
      run: composer install --no-progress --prefer-dist

    - name: Run PHPUnit
      run: vendor/bin/phpunit
      env:
        DATABASE_TEST_URL: sqlite://./testdb.sqlite

    - name: Run PHPStan
      run: vendor/bin/phpstan analyse src/ --no-progress

    - name: Run PHPCS
      run: vendor/bin/phpcs --standard=phpcs.xml src/ tests/
